<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h2 { margin-bottom: 20px; color: #38bdf8; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #475569;
            border-radius: 6px;
            background-color: #0f172a;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #38bdf8;
            border: none;
            border-radius: 6px;
            color: #0f172a;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background-color: #0ea5e9; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Video Downloader</h2>
        <input type="text" id="urlInput" placeholder="Yahan video ka link paste karein...">
        <button onclick="downloadVideo()">Download Karein</button>
    </div>

    <script>
        function downloadVideo() {
            var url = document.getElementById('urlInput').value;
            if(url.trim() === "") {
                alert("Pehle kripya link paste karein!");
            } else {
                alert("Aapka link mil gaya hai! Backend server connect hone par yahan se download start hoga.");
            }
        }
    </script>
</body>
</html>
